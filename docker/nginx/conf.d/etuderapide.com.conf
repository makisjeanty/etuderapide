server {
    listen 80;
    server_name etuderapide.com www.etuderapide.com;
    return 301 https://etuderapide.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.etuderapide.com;
    return 301 https://etuderapide.com$request_uri;

    ssl_certificate /etc/ssl/certs/etuderapide.com.crt;
    ssl_certificate_key /etc/ssl/private/etuderapide.com.key;
    include /etc/ssl/options-ssl-nginx.conf;
    ssl_dhparam /etc/ssl/certs/dhparam.pem;
}

server {
    listen 443 ssl http2;
    server_name etuderapide.com;
    root /var/www/public;
    index index.php index.html;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/etuderapide.com.crt;
    ssl_certificate_key /etc/ssl/private/etuderapide.com.key;
    include /etc/ssl/options-ssl-nginx.conf;
    ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'none'; form-action 'self'; base-uri 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/ld+json;
    gzip_disable "msie6";

    # File upload
    client_max_body_size 20M;

    # Root location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Favicon and robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Static assets with long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to vendor and storage directories
    location ~ /(vendor|storage/app|storage/framework|storage/logs) {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/public;
    }

    # Logging
    access_log /var/log/nginx/etuderapide-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/etuderapide-error.log warn;
}