services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: etuderapide-app
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: file
      CACHE_STORE: file
      AI_PIPELINE_URL: http://pipeline:3001

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pipeline:
        condition: service_started
    networks:
      - etuderapide-net
    volumes:
      - public_data:/var/www/public
      - storage_data:/var/www/storage

  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etuderapide-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./pipeline
    image: etuderapide-pipeline
    restart: always
    env_file:
      - .env
    networks:
      - etuderapide-net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - etuderapide-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - public_data:/var/www/public:ro
      - storage_data:/var/www/storage:ro
    depends_on:
      - app
    networks:
      - etuderapide-net

networks:
  etuderapide-net:
    driver: bridge

volumes:
  postgres_data:
  public_data:
  storage_data:
