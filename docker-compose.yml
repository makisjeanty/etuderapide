services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: etuderapide-app
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - etuderapide-net

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etuderapide-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./pipeline
    image: etuderapide-pipeline
    restart: always
    networks:
      - etuderapide-net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - etuderapide-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public:/var/www/public:ro
    depends_on:
      - app
    networks:
      - etuderapide-net

networks:
  etuderapide-net:
    driver: bridge

volumes:
  postgres_data:
