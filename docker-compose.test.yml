services:
  php-test:
    build:
      context: .
      dockerfile: docker/php-test/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    command: php vendor/bin/phpunit --testdox
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: etuderapide_test
      DB_USERNAME: etuderapide
      DB_PASSWORD: etuderapide2026
      APP_ENV: testing
      APP_KEY: base64:bJ+mHsjttoCTJrk8Ru/rlGafsEBZUk01A+SQdbfhRqQ=

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etuderapide_test
      POSTGRES_USER: etuderapide
      POSTGRES_PASSWORD: etuderapide2026
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etuderapide"]
      interval: 5s
      timeout: 5s
      retries: 5
